# Loan Microservice Configuration
# =====================================
# Server runs on port 8082 (different from account-service on 8081)

server.port=8082
spring.application.name=loan-service

# =====================================================
# Actuator - expose health and info endpoints
# =====================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================================================
# Application Info (shown at /actuator/info)
# =====================================================
info.app.name=Loan Microservice
info.app.description=Handles customer loan applications and management
info.app.version=1.0.0

# =====================================================
# Logging
# =====================================================
logging.level.com.cognizant=DEBUG
