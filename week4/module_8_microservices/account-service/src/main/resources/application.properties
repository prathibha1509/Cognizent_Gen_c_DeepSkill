# Account Microservice Configuration
# =====================================
# Server runs on port 8081 (different from loan-service on 8082)

server.port=8081
spring.application.name=account-service

# =====================================================
# Actuator - expose health and info endpoints
# =====================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================================================
# Application Info (shown at /actuator/info)
# =====================================================
info.app.name=Account Microservice
info.app.description=Handles customer bank accounts
info.app.version=1.0.0

# =====================================================
# Logging
# =====================================================
logging.level.com.cognizant=DEBUG
