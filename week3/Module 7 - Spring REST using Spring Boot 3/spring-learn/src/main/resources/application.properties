# =====================================================
# Server Configuration
# =====================================================
server.port=8083

# =====================================================
# Application Name
# =====================================================
spring.application.name=spring-learn

# =====================================================
# Logging Configuration
# =====================================================
# Set DEBUG level for the entire com.cognizant package
logging.level.com.cognizant=DEBUG
logging.level.org.springframework=INFO

# Log pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =====================================================
# Spring Security – In-memory user for /authenticate
# =====================================================
spring.security.user.name=user
spring.security.user.password=pwd

# =====================================================
# JWT Configuration
# =====================================================
# Token validity: 20 minutes (in milliseconds)
jwt.token.validity=1200000
